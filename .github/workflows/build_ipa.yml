name: 手动打包IPA
on:
  workflow_dispatch: # 只能网页手动点击运行，推送代码不会自动打包

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 编译Release版App，绕过archive报错
        run: |
          mkdir -p build
          xcodebuild build \
          -project StikDebug.xcodeproj \
          -scheme StikDebug \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath ./build/dd \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES=YES \
          SWIFT_VERSION=5 \
          IPHONEOS_DEPLOYMENT_TARGET=16.0 \
          COMPILE_BITCODE=NO

      - name: 打包Payload生成标准无签名IPA（巨魔/TrollStore通用）
        run: |
          cd build/dd/Build/Products/Release-iphoneos
          mkdir -p Payload
          cp -r StikDebug.app Payload/
          zip -q -r StikDebug.ipa Payload
          mv StikDebug.ipa ../../

      - name: 上传成品IPA文件
        uses: actions/upload-artifact@v7
        with:
          name: StikDebug收号器
          path: build/StikDebug.ipa